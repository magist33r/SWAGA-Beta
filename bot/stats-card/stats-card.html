<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Card</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Roboto', sans-serif;
  }

  /* ── Card ── */
  .card {
    position: relative;
    width: 1240px;
    height: 380px;
    background: #181410;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
  }

  /* ── Фоновая текстура (оранжевый гранж справа) ── */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 80% at 72% 50%,
        rgba(200, 90, 10, 0.28) 0%,
        rgba(150, 55, 5, 0.12) 45%,
        transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Зернистость */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Левая оранжевая полоска ── */
  .side-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(to bottom, #f07020, #c04a08);
    z-index: 10;
  }

  /* ── Фото игрока ── */
  .player-photo {
    position: relative;
    z-index: 1;
    width: 400px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .player-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: grayscale(100%) contrast(1.05);
  }

  /* Градиент-переход фото → контент */
  .player-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right,
      transparent 40%,
      rgba(24, 20, 16, 0.6) 75%,
      #181410 100%);
  }

  /* ── Правая часть — контент ── */
  .content {
    position: relative;
    z-index: 2;
    flex: 1;
    padding: 28px 36px 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── Имя ── */
  .player-name {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }

  .player-name .skull-icon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(240,112,32,0.6));
  }

  .player-name h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    line-height: 1;
  }

  /* ── Строка 1: три больших стата ── */
  .row-big {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  /* ── Строки 2-3: маленькие статы ── */
  .row-small {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .row-small-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ── Ячейка стата ── */
  .stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 10px 14px 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: #aaa;
    text-transform: none;
    letter-spacing: 0.2px;
  }

  .stat-value-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stat-icon {
    font-size: 22px;
    line-height: 1;
    color: #f07020;
    flex-shrink: 0;
    /* SVG иконки через inline */
  }

  .stat-value {
    font-family: 'Oswald', sans-serif;
    font-size: 30px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
  }

  /* Большие ячейки — иконка крупнее, значение крупнее */
  .stat.big .stat-icon { font-size: 26px; }
  .stat.big .stat-value { font-size: 36px; }
  .stat.big .stat-label { font-size: 13px; }

  /* ── SVG иконки ── */
  .icon-svg {
    width: 26px;
    height: 26px;
    fill: #f07020;
    flex-shrink: 0;
  }
  .stat:not(.big) .icon-svg {
    width: 20px;
    height: 20px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="side-bar"></div>

  <!-- Фото -->
  <div class="player-photo">
    <!-- Замени src на реальное фото игрока -->
    <img src="player.png" alt="player"
         onerror="this.style.display='none'">
  </div>

  <!-- Контент -->
  <div class="content">

    <!-- Имя -->
    <div class="player-name">
      <span class="skull-icon">☠️</span>
      <h1>farsh.mosquit</h1>
    </div>

    <!-- Строка 1: Убил игроков | Умер | Убил зомби -->
    <div class="row-big">

      <div class="stat big">
        <span class="stat-label">Убил игроков</span>
        <div class="stat-value-row">
          <!-- Череп -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2a9 9 0 0 0-9 9c0 3.07 1.54 5.78 3.9 7.39V21h10v-2.61A9 9 0 0 0 21 11a9 9 0 0 0-9-9zm-2.5 13H8v-2.5a1 1 0 0 1 2 0V15zm5 0h-1.5v-2.5a1 1 0 0 1 2 0V15z"/></svg>
          <span class="stat-value">186</span>
        </div>
      </div>

      <div class="stat big">
        <span class="stat-label">Умер</span>
        <div class="stat-value-row">
          <!-- Надгробие -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C9.24 2 7 4.24 7 7v1H5v13h14V8h-2V7c0-2.76-2.24-5-5-5zm0 2c1.66 0 3 1.34 3 3v1H9V7c0-1.66 1.34-3 3-3zm1 8h-2v-2h2v2zm0 4h-2v-2h2v2z"/></svg>
          <span class="stat-value">29</span>
        </div>
      </div>

      <div class="stat big">
        <span class="stat-label">Убил зомби</span>
        <div class="stat-value-row">
          <!-- Монстр/зомби -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM9.5 7a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm5 10H9v-1a3 3 0 0 1 3-3 3 3 0 0 1 3 3v1zm0-7a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/></svg>
          <span class="stat-value">848</span>
        </div>
      </div>

    </div>

    <!-- Строка 2: КД | Сессий | Дал. убийство -->
    <div class="row-small">

      <div class="stat">
        <span class="stat-label">КД</span>
        <div class="stat-value-row">
          <!-- Волна / ratio -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M17 12c-1.11 0-2 .89-2 2s.89 2 2 2 2-.89 2-2-.89-2-2-2zM7 8c-1.11 0-2 .89-2 2s.89 2 2 2 2-.89 2-2-.89-2-2-2zm2.78 7.78l-1.56-1.56C8.81 14.58 9 14.31 9 14c0-.55-.45-1-1-1s-1 .45-1 1 .45 1 1 1c.31 0 .58-.13.78-.34l1.56 1.56C9.58 16.19 9 17.03 9 18c0 1.66 1.34 3 3 3s3-1.34 3-3c0-.97-.58-1.81-1.34-2.22zM12 19c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm3-13c0 .55.45 1 1 1s1-.45 1-1-.45-1-1-1-1 .45-1 1zm-3-2C8.13 4 5 7.13 5 11h2c0-2.76 2.24-5 5-5s5 2.24 5 5h2c0-3.87-3.13-7-7-7z"/></svg>
          <span class="stat-value">6.41</span>
        </div>
      </div>

      <div class="stat">
        <span class="stat-label">Сессий</span>
        <div class="stat-value-row">
          <!-- Вход/сессия -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
          <span class="stat-value">108</span>
        </div>
      </div>

      <div class="stat">
        <span class="stat-label">Дал. убийство</span>
        <div class="stat-value-row">
          <!-- Прицел -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93V18h2v1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.19 2.09 5.91 5 6.86V16h2v2.86c2.91-.95 5-3.67 5-6.86h2c0 4.08-3.06 7.44-7 7.93zM12 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
          <span class="stat-value">777м</span>
        </div>
      </div>

    </div>

    <!-- Строка 3: В игре | Попадает в -->
    <div class="row-small-2col">

      <div class="stat">
        <span class="stat-label">В игре</span>
        <div class="stat-value-row">
          <!-- Часы -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
          <span class="stat-value">140ч</span>
        </div>
      </div>

      <div class="stat">
        <span class="stat-label">Попадает в</span>
        <div class="stat-value-row">
          <!-- Силуэт/тело -->
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 8c3.31 0 6 2.69 6 6v1H6v-1c0-3.31 2.69-6 6-6z"/><circle cx="12" cy="5" r="3" opacity="0.4"/><path d="M9 20h6v2H9z" opacity="0.5"/></svg>
          <span class="stat-value">Торс</span>
        </div>
      </div>

    </div>

  </div><!-- /content -->
</div><!-- /card -->

</body>
</html>
